server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/comments?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: Zycx:20040104
    hikari:
      # 连接池中允许的最小空闲连接数。启动时会尝试创建这些连接。
      minimum-idle: 10
      # 连接池最大连接数
      maximum-pool-size: 20
      # 连接测试查询，确保连接有效
      connection-test-query: SELECT 1
      # 允许在启动时如果无法建立连接直接报错，而不是等到调用时才发现
      initialization-fail-timeout: 1
  redis:
    host: 127.0.0.1
    port: 6379
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug